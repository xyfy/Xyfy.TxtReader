<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="extName">Xyfy TXT Reader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <p class="eyebrow" data-i18n="popupEyebrow">TXT Reader</p>
      <h1 data-i18n="popupHeading">Open Reader</h1>
      <p class="summary" data-i18n="popupSummary">Import a local TXT file and continue reading with pagination, backup, and sync support.</p>
      <button id="open-reader" type="button" data-i18n="popupOpenButton">Open Reader</button>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
